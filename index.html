<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GAR — Weekly Points Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #0f0e13;
  --surface: #1a1824;
  --surface2: #221f2e;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0eeff;
  --text2: #9b96b8;
  --text3: #5f5a78;
  --accent: #7c6dfa;
  --accent-dim: rgba(124,109,250,0.12);
  --accent-border: rgba(124,109,250,0.3);
  --gold: #f5c842;
  --gold-dim: rgba(245,200,66,0.12);
  --gold-border: rgba(245,200,66,0.28);
  --radius: 10px;
  --radius-lg: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 1.75rem 1rem 3rem;
}

.app { max-width: 760px; margin: 0 auto; }

.app-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 1.5rem;
}
.app-title {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.3px;
}
.app-sub {
  font-size: 13px;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
}

/* Tabs */
.day-tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 1.1rem;
}
.tab-btn {
  padding: 7px 15px;
  font-size: 13px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  transition: background 0.13s, border-color 0.13s, color 0.13s;
}
.tab-btn:hover {
  border-color: var(--border2);
  color: var(--text);
  background: var(--surface2);
}
.tab-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent-border);
  color: #c5beff;
}

/* Panel */
.day-panel { display: none; }
.day-panel.active { display: block; }

.panel-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.9rem 1.2rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  gap: 12px;
}
.panel-title { font-size: 15px; font-weight: 600; }
.panel-subtitle {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
  font-family: 'DM Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.panel-total {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
  flex-shrink: 0;
  font-family: 'DM Mono', monospace;
}

/* Coin icon */
.coin {
  width: 17px; height: 17px;
  border-radius: 50%;
  background: var(--gold-dim);
  border: 1px solid var(--gold-border);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  font-weight: 700;
  color: var(--gold);
  flex-shrink: 0;
  font-family: 'DM Mono', monospace;
}

/* Task list */
.task-list { padding: 0 1.2rem; }

/* Normal task row: name | pts-badge | controls */
.task-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.task-row:last-child { border-bottom: none; }

/* Level-select task row: spans full width, stacks controls below name */
.task-row.lvl-row {
  grid-template-columns: 1fr;
  gap: 8px;
}

.task-name { font-size: 13px; color: var(--text); line-height: 1.45; }
.task-meta {
  font-size: 11px;
  color: var(--text3);
  margin-top: 3px;
  font-family: 'DM Mono', monospace;
}

.pts-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--text2);
  white-space: nowrap;
  font-family: 'DM Mono', monospace;
}
.pts-badge .coin { width: 13px; height: 13px; font-size: 7px; }

.task-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}
.lvl-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.task-input {
  width: 70px;
  padding: 5px 8px;
  font-size: 13px;
  font-family: 'DM Mono', monospace;
  text-align: center;
  border: 1px solid var(--border2);
  border-radius: 7px;
  background: #0c0b10;
  color: var(--text);
  transition: border-color 0.13s, box-shadow 0.13s;
  -moz-appearance: textfield;
}
.task-input::-webkit-inner-spin-button,
.task-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.task-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(124,109,250,0.18);
}

.task-select {
  padding: 5px 8px;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  border: 1px solid var(--border2);
  border-radius: 7px;
  background: #0c0b10;
  color: var(--text);
  cursor: pointer;
  transition: border-color 0.13s, box-shadow 0.13s;
  flex: 1;
  min-width: 0;
  max-width: 260px;
}
.task-select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(124,109,250,0.18);
}

.task-earned {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  min-width: 48px;
  text-align: right;
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
}
.task-earned.zero { color: var(--text3); }

/* Footer */
.panel-footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
  padding: 0.85rem 1.2rem;
  border-top: 1px solid var(--border);
  background: var(--surface2);
}
.footer-label { font-size: 12px; color: var(--text3); }
.footer-val {
  font-size: 18px;
  font-weight: 600;
  color: var(--accent);
  font-family: 'DM Mono', monospace;
}

/* Weekly total bar */
.week-bar {
  margin-top: 1rem;
  padding: 1rem 1.2rem;
  background: var(--accent-dim);
  border: 1px solid var(--accent-border);
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.week-label { font-size: 13px; color: var(--text2); }
.week-val {
  font-size: 22px;
  font-weight: 600;
  font-family: 'DM Mono', monospace;
  display: flex;
  align-items: center;
  gap: 8px;
}
.week-val .coin { width: 20px; height: 20px; font-size: 10px; }

/* Responsive */
@media (max-width: 520px) {
  body { padding: 1rem 0.75rem 2rem; }
  .app-header { gap: 6px; }
  .app-title { font-size: 19px; }
  .tab-btn { padding: 6px 11px; font-size: 12px; }
  .panel-header { flex-wrap: wrap; }
  .task-row { grid-template-columns: 1fr auto; gap: 8px; }
  .pts-badge { display: none; }
  .task-controls { justify-content: flex-end; }
  .task-input { width: 72px; }
  .week-val { font-size: 18px; }
  .task-select { max-width: 100%; }
}
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <span class="app-title">GAR Calculator</span>
    <span class="app-sub">weekly points tracker</span>
  </div>
  <div class="day-tabs" id="tabs"></div>
  <div id="panels"></div>
  <div class="week-bar">
    <span class="week-label">Weekly Total</span>
    <span class="week-val"><span class="coin">★</span><span id="weekTotal">0</span></span>
  </div>
</div>

<script>
const mobLevels    = Array.from({length:30},(_,i)=>({label:`Lvl ${i+1}`,pts:40+i*40}));
const bossLevels   = Array.from({length:11},(_,i)=>({label:`Lvl ${i+1}`,pts:Math.round(400+i*360)}));
const soldierLevels= [...Array.from({length:10},(_,i)=>({label:`Lvl ${i+1}`,pts:40+i*40})),{label:'Lvl 11',pts:450}];

const days=[
  {label:"Day 1",name:"Territory Revival",tasks:[
    {name:"Buy 1 Diamonds from Packs",pts:10},
    {name:"Boost Facility Power by 1 pt",pts:40},
    {name:"Use Construction Speed-up",pts:30,hint:"enter minutes"},
    {name:"Use Timber",pts:1,divisor:400,hint:"enter total Timber"},
    {name:"Use Stone",pts:1,divisor:400,hint:"enter total Stone"},
    {name:"Use Rubies",pts:1,divisor:200,hint:"enter total Rubies"},
    {name:"Consume Relic Shards",pts:200,note:"200 / 1000 / 5000 pts"},
    {name:"Consume Magic Stones",pts:600,divisor:2000,hint:"enter total Magic Stones"},
    {name:"Consume Arcane Crystals",pts:1200},
    {name:"Use Dragon Essence",pts:3200},
    {name:"Summon relic in tavern",pts:1500},
  ]},
  {label:"Day 2",name:"Tech Boost",tasks:[
    {name:"Buy 1 Diamonds from Packs",pts:10},
    {name:"Boost Research Power by 1 pt",pts:40},
    {name:"Use Research Speed-up",pts:30,hint:"enter minutes"},
    {name:"Use Timber",pts:1,divisor:400,hint:"enter total Timber"},
    {name:"Use Stone",pts:1,divisor:400,hint:"enter total Stone"},
    {name:"Use Rubies",pts:1,divisor:200,hint:"enter total Rubies"},
    {name:"Consume Relic Shards",pts:200,note:"200 / 1000 / 5000 pts"},
    {name:"Consume Magic Stones",pts:600,divisor:2000,hint:"enter total Magic Stones"},
    {name:"Consume Arcane Crystals",pts:1200},
    {name:"Use Dragon Essence",pts:3200},
    {name:"Summon relic in tavern",pts:1500},
  ]},
  {label:"Day 3",name:"Global Battles",tasks:[
    {name:"Buy 1 Diamonds from Packs",pts:40},
    {name:"Gather Stones",pts:1,divisor:2,hint:"enter total Stones"},
    {name:"Gather Wood",pts:1,divisor:2,hint:"enter total Wood"},
    {name:"Gather Rubies",pts:1,hint:"enter total Rubies"},
    {name:"Kill mobs on the world map",type:"levelSelect",levels:mobLevels,note:"Lvl1=40 → Lvl30=1,200 pts"},
    {name:"Complete 1 Bounty Quest",pts:2000},
    {name:"Kill bosses on the world map",type:"levelSelect",levels:bossLevels,note:"Lvl1=400 → Lvl11=4,000 pts"},
    {name:"Help in a rally",pts:100},
    {name:"Use Refined Metal",pts:400,divisor:100,hint:"enter total Refined Metal"},
    {name:"Use Magic Thread",pts:400},
    {name:"Use Orichalcum",pts:600},
  ]},
  {label:"Day 4",name:"Call of the Hero",tasks:[
    {name:"Buy 1 Diamonds from Packs",pts:40},
    {name:"Recruit hero in the tavern",pts:1500},
    {name:"Consume Hero Shards",pts:1000,note:"1000 / 4000 / 4000 pts"},
    {name:"Use Refined Metal",pts:400,divisor:100,hint:"enter total Refined Metal"},
    {name:"Use Magic Thread",pts:400},
    {name:"Use Orichalcum",pts:600},
  ]},
  {label:"Day 5",name:"Combat Ready",tasks:[
    {name:"Buy 1 Diamonds from Packs",pts:40},
    {name:"Consume pet food",pts:960,divisor:100,hint:"enter total pet food"},
    {name:"Use Training Speed-Up",pts:30,hint:"enter minutes"},
    {name:"Train Soldiers",type:"levelSelect",levels:soldierLevels,note:"Lvl1=40 → Lvl11=450 pts"},
  ]},
  {label:"Day 6",name:"Invincible Warrior",tasks:[
    {name:"Buy 1 Diamonds from Packs",pts:10},
    {name:"Win 1 battle in Fort Contest",pts:50000},
    {name:"Lost 1 battle in Fort Contest",pts:10000},
    {name:"Use Healing Speed-up",pts:30,hint:"enter minutes"},
    {name:"Heal soldiers",pts:4,note:"4–40 pts"},
    {name:"Kill level 1-10 soldiers",pts:1},
    {name:"Kill level 1-10 soldiers of the hostile guild",pts:1,note:"1–7 pts"},
    {name:"Kill level 1-11 soldiers in Fort Contest",pts:3,note:"3–21 pts"},
  ]},
];

const state=days.map(d=>d.tasks.map(t=>t.type==='levelSelect'?{qty:0,lvlIdx:0}:0));

function earnedPts(d,t){
  const task=days[d].tasks[t];
  if(task.type==='levelSelect'){const s=state[d][t];return s.qty*task.levels[s.lvlIdx].pts;}
  return Math.floor(state[d][t]/(task.divisor||1))*task.pts;
}
function calcDay(d){return days[d].tasks.reduce((s,_,i)=>s+earnedPts(d,i),0);}
function calcWeek(){return days.reduce((s,_,d)=>s+calcDay(d),0);}
function refreshTotals(d){
  document.getElementById('hdr'+d).textContent=calcDay(d).toLocaleString();
  document.getElementById('ftr'+d).textContent=calcDay(d).toLocaleString();
  document.getElementById('weekTotal').textContent=calcWeek().toLocaleString();
}

const tabsEl=document.getElementById('tabs');
const panelsEl=document.getElementById('panels');

days.forEach((day,d)=>{
  // Tab
  const btn=document.createElement('button');
  btn.className='tab-btn'+(d===0?' active':'');
  btn.textContent=day.label;
  btn.onclick=()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.day-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel'+d).classList.add('active');
  };
  tabsEl.appendChild(btn);

  // Panel wrapper
  const panel=document.createElement('div');
  panel.className='day-panel'+(d===0?' active':'');
  panel.id='panel'+d;

  // Card
  const card=document.createElement('div');
  card.className='panel-card';
  card.innerHTML=`
    <div class="panel-header">
      <div>
        <div class="panel-title">${day.label}</div>
        <div class="panel-subtitle">${day.name}</div>
      </div>
      <div class="panel-total"><span class="coin">★</span><span id="hdr${d}">0</span> pts</div>
    </div>`;

  const list=document.createElement('div');
  list.className='task-list';

  day.tasks.forEach((task,t)=>{
    const row=document.createElement('div');

    let metaHTML='';
    if(task.note) metaHTML+=`<div class="task-meta">${task.note}</div>`;
    if(task.hint) metaHTML+=`<div class="task-meta">${task.hint}</div>`;

    if(task.type==='levelSelect'){
      row.className='task-row lvl-row';
      const opts=task.levels.map((lv,i)=>`<option value="${i}">${lv.label} — ${lv.pts.toLocaleString()} pts</option>`).join('');
      row.innerHTML=`
        <div>
          <div class="task-name">${task.name}</div>
          ${metaHTML}
        </div>
        <div class="lvl-controls">
          <select class="task-select" id="sel${d}_${t}">${opts}</select>
          <input type="number" min="0" class="task-input" value="0" id="inp${d}_${t}" />
          <span class="task-earned zero" id="earn${d}_${t}">0</span>
        </div>`;
    } else {
      row.className='task-row';
      const div2=task.divisor||1;
      const ptsLabel=div2>1?`${task.pts} / ${div2}`:task.pts.toLocaleString();
      row.innerHTML=`
        <div>
          <div class="task-name">${task.name}</div>
          ${metaHTML}
        </div>
        <span class="pts-badge"><span class="coin">★</span>${ptsLabel}</span>
        <div class="task-controls">
          <input type="number" min="0" class="task-input" value="0" id="inp${d}_${t}" />
          <span class="task-earned zero" id="earn${d}_${t}">0</span>
        </div>`;
    }

    list.appendChild(row);

    setTimeout(()=>{
      const inp=document.getElementById(`inp${d}_${t}`);
      if(!inp) return;
      inp.addEventListener('focus',()=>{if(inp.value==='0')inp.value='';});
      inp.addEventListener('blur',()=>{if(inp.value==='')inp.value='0';});
      const recalc=()=>{
        const v=Math.max(0,parseInt(inp.value)||0);
        if(task.type==='levelSelect') state[d][t].qty=v;
        else state[d][t]=v;
        const earned=earnedPts(d,t);
        const el=document.getElementById(`earn${d}_${t}`);
        el.textContent=earned.toLocaleString();
        el.className='task-earned'+(earned===0?' zero':'');
        refreshTotals(d);
      };
      inp.addEventListener('input',recalc);
      if(task.type==='levelSelect'){
        const sel=document.getElementById(`sel${d}_${t}`);
        if(sel) sel.addEventListener('change',()=>{
          state[d][t].lvlIdx=parseInt(sel.value);
          const earned=earnedPts(d,t);
          const el=document.getElementById(`earn${d}_${t}`);
          el.textContent=earned.toLocaleString();
          el.className='task-earned'+(earned===0?' zero':'');
          refreshTotals(d);
        });
      }
    },0);
  });

  card.appendChild(list);
  card.innerHTML+=`
    <div class="panel-footer">
      <span class="footer-label">Day total</span>
      <span class="footer-val" id="ftr${d}">0</span>
    </div>`;
  panel.appendChild(card);
  panelsEl.appendChild(panel);
});
</script>
</body>
</html>
